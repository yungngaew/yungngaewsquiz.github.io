                        <p class="text-gray-600 text-lg">Deep Learning & NLP</p>
                        <p class="text-sm text-gray-500 mt-2">ทำแบบทดสอบทีละวีคตามที่ต้องการ</p>
                        <div class="mt-4 text-2xl font-bold text-green-600">ทำเสร็จแล้ว ${allCompleted}/5 วีค</div>
                    </div>

                    <div class="space-y-3 mb-6">
                        ${quizzes.map(quiz => {
                            const weekKey = `week${quiz.week}`;
                            const answered = weekAnswers[weekKey] ? Object.keys(weekAnswers[weekKey]).length : 0;
                            const total = quiz.questions.length;
                            const isCompleted = answered === total;
                            
                            return `
                                <button onclick="startWeek(${quiz.week})" class="w-full p-6 rounded-lg border-2 transition ${
                                    isCompleted ? 'border-green-500 bg-green-50' : 'border-indigo-300 bg-white hover:border-indigo-600'
                                }">
                                    <div class="flex items-center justify-between">
                                        <div class="text-left">
                                            <h3 class="text-xl font-bold text-indigo-700">Week ${quiz.week}</h3>
                                            <p class="text-sm text-gray-600 mt-1">จำนวน ${total} ข้อ</p>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-2xl font-bold ${isCompleted ? 'text-green-600' : 'text-gray-500'}">${answered}/${total}</div>
                                            <p class="text-xs text-gray-500 mt-1">${isCompleted ? '✅ เสร็จ' : '⏳ ยังค่าง'}</p>
                                        </div>
                                    </div>
                                </button>
                            `;
                        }).join('')}
                    </div>

                    ${allCompleted === 5 ? `
                        <button onclick="viewSummary()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg text-lg transition shadow-lg">
                            🏆 ดูผลการทดสอบทั้งหมด
                        </button>
                    ` : ''}
                </div>
            `;
        }

        function renderWeekQuiz(app) {
            const quiz = quizzes.find(q => q.week === selectedWeek);
            const weekKey = `week${selectedWeek}`;
            if (!weekAnswers[weekKey]) weekAnswers[weekKey] = {};
            const currentAnswers = weekAnswers[weekKey];
            const answered = Object.keys(currentAnswers).length;
            
            app.innerHTML = `
                <div class="fade-in">
                    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                        <h1 class="text-3xl font-bold text-indigo-700 mb-2">📚 Week ${selectedWeek}</h1>
                        <p class="text-gray-600">ทำแบบทดสอบสัปดาห์ที่ ${selectedWeek}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-gray-700 font-semibold">ตอบแล้ว: ${answered}/${quiz.questions.length}</span>
                            <span class="text-sm text-gray-500">${Math.round((answered/quiz.questions.length)*100)}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3 mt-2 overflow-hidden">
                            <div class="bg-indigo-600 h-full transition-all" style="width: ${(answered/quiz.questions.length)*100}%"></div>
                        </div>
                    </div>

                    <div class="space-y-6 mb-6">
                        ${quiz.questions.map((q, idx) => `
                            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-indigo-600">
                                <h3 class="font-bold text-lg mb-4 text-gray-800">${idx + 1}. ${q.text}</h3>
                                <div class="space-y-2">
                                    ${q.options.map((opt, optIdx) => `
                                        <label class="flex items-center p-3 rounded-lg border-2 cursor-pointer transition ${
                                            currentAnswers[q.uniqueId] === optIdx 
                                                ? 'border-indigo-600 bg-indigo-50' 
                                                : 'border-gray-200 bg-white hover:border-indigo-300'
                                        }">
                                            <input type="radio" name="${q.uniqueId}" ${currentAnswers[q.uniqueId] === optIdx ? 'checked' : ''} onchange="answerQuestion('${q.uniqueId}', ${optIdx})" class="w-4 h-4">
                                            <span class="ml-3 text-gray-700">${opt}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex gap-3">
                        <button onclick="state='mode'; render()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition">
                            ← กลับ
                        </button>
                        <button onclick="submitWeek()" ${answered < quiz.questions.length ? 'disabled' : ''} class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                            ✅ ส่ง Week ${selectedWeek} (${answered}/${quiz.questions.length})
                        </button>
                    </div>
                </div>
            `;
        }

        function renderWeekResult(app) {
            const quiz = quizzes.find(q => q.week === selectedWeek);
            const weekKey = `week${selectedWeek}`;
            const currentAnswers = weekAnswers[weekKey] || {};
            
            let correct = 0;
            quiz.questions.forEach(q => {
                if (currentAnswers[q.uniqueId] === q.correct) correct++;
            });
            
            const percentage = Math.round((correct / quiz.questions.length) * 100);

            app.innerHTML = `
                <div class="fade-in space-y-6">
                    <div class="bg-white rounded-lg shadow-lg p-8 text-center">
                        <h2 class="text-3xl font-bold text-indigo-700 mb-4">🏆 ผลการทดสอบ Week ${selectedWeek}</h2>
                        <div class="text-6xl font-bold text-green-600 mb-2">${correct}/${quiz.questions.length}</div>
                        <div class="text-3xl font-bold text-indigo-700 mb-6">${percentage}%</div>
                        
                        <div class="mb-6 h-4 bg-gray-200 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-green-500 to-blue-600 transition-all" style="width: ${percentage}%"></div>
                        </div>

                        <p class="text-xl text-gray-700">
                            ${percentage === 100 ? '🎉 ยอดเยี่ยม!!' : 
                              percentage >= 80 ? '👏 ดีมาก!' :
                              percentage >= 60 ? '💪 ดี' :
                              '📖 ไปอ่านเพิ่มเติม'}
                        </p>
                    </div>

                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h3 class="text-2xl font-bold text-indigo-700 mb-4">📋 รายละเอียดคำตอบ</h3>
                        <div class="space-y-3">
                            ${quiz.questions.map((q, idx) => {
                                const isCorrect = currentAnswers[q.uniqueId] === q.correct;
                                return `
                                    <div class="p-4 rounded-lg ${isCorrect ? 'bg-green-50 border-l-4 border-green-600' : 'bg-red-50 border-l-4 border-red-600'}">
                                        <p class="font-semibold text-gray-800">${idx + 1}. ${q.text}</p>
                                        <p class="text-sm mt-2">
                                            <span class="text-gray-600">คำตอบของคุณ: </span>
                                            <span class="${isCorrect ? 'text-green-700 font-bold' : 'text-red-700 font-bold'}">${q.options[currentAnswers[q.uniqueId]]}</span>
                                        </p>
                                        ${!isCorrect ? `
                                            <p class="text-sm mt-1">
                                                <span class="text-gray-600">คำตอบที่ถูก: </span>
                                                <span class="text-green-700 font-bold">${q.options[q.correct]}</span>
                                            </p>
                                        ` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="editWeek()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                            ✏️ แก้ไขคำตอบ
                        </button>
                        <button onclick="state='mode'; render()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition">
                            ← กลับไปเมนู
                        </button>
                    </div>
                </div>
            `;
        }

        function renderSummary(app) {
            const results = quizzes.map(quiz => {
                const weekKey = `week${quiz.week}`;
                const currentAnswers = weekAnswers[weekKey] || {};
                let correct = 0;
                quiz.questions.forEach(q => {
                    if (currentAnswers[q.uniqueId] === q.correct) correct++;
                });
                return { week: quiz.week, correct, total: quiz.questions.length };
            });

            const totalCorrect = results.reduce((sum, r) => sum + r.correct, 0);
            const totalQuestions = results.reduce((sum, r) => sum + r.total, 0);
            const overallPercentage = Math.round((totalCorrect / totalQuestions) * 100);

            app.innerHTML = `
                <div class="fade-in space-y-6">
                    <div class="bg-white rounded-lg shadow-lg p-8 text-center">
                        <h2 class="text-3xl font-bold text-indigo-700 mb-4">🏆 สรุปผลการทดสอบทั้งหมด</h2>
                        <div class="text-6xl font-bold text-green-600 mb-2">${totalCorrect}/${totalQuestions}</div>
                        <div class="text-3xl font-bold text-indigo-700 mb-6">${overallPercentage}%</div>
                        
                        <div class="mb-6 h-4 bg-gray-200 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-green-500 to-blue-600" style="width: ${overallPercentage}%"></div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        ${results.map(r => `
                            <div class="bg-white rounded-lg shadow-lg p-4">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-lg text-gray-800">Week ${r.week}</span>
                                    <span class="font-bold text-lg text-indigo-700">${r.correct}/${r.total}</span>
                                </div>
                                <div class="h-2 bg-gray-200 rounded-full overflow-hidden mt-2">
                                    <div class="h-full bg-indigo-600" style="width: ${(r.correct/r.total)*100}%"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="state='mode'; render()" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-lg transition">
                        ← กลับไปเมนู
                    </button>
                </div>
            `;
        }

        function startWeek(week) {
            selectedWeek = week;
            state = 'week_quiz';
            render();
        }

        function answerQuestion(uniqueId, optIdx) {
            const weekKey = `week${selectedWeek}`;
            if (!weekAnswers[weekKey]) weekAnswers[weekKey] = {};
            weekAnswers[weekKey][uniqueId] = optIdx;
            render();
        }

        function submitWeek() {
            state = 'week_result';
            render();
        }

        function editWeek() {
            state = 'week_quiz';
            render();
        }

        function viewSummary() {
            const app = document.getElementById('app');
            renderSummary(app);
        }

        render();
    </script>
</body>
</html>
